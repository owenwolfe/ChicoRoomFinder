<!-- Minimal working A*. Loads from: python3 -m http.server 8000 -->
 <!doctype html>
 <html>
 <head>
   <meta charset="utf-8">
   <title>A* Viewer</title>
   <script src="https://cdn.plot.ly/plotly-2.35.2.min.js"></script>
   <style>
     html, body, #plot { width:100%; height:100%; margin:0; }
     #info {
       position:absolute; top:10px; left:10px;
       background:white; padding:10px;
       border:1px solid #ccc; z-index:10;
       font-family:sans-serif;
     }
   </style>
 </head>
 <body>
   <div id="info">
     <div id="status">Loading...</div>
     <button onclick="run()">Run A*</button>
   </div>
   <div id="plot"></div>

 <script>
 let nodes, edges, nodeMap = new Map(), adj = new Map();
 let startId, goalId;

 function z(kind){
   if(kind==="entrance") return 0;
   if(kind==="destination") return 0;
   if(kind==="junction") return 0;
   if(kind==="anchor") return 0;
   return 0;
 }

 function color(kind){
   if(kind==="entrance") return "green";
   if(kind==="destination") return "red";
   if(kind==="junction") return "purple";
   if(kind==="anchor") return "grey";
   return "blue";
 }

 function sleep(ms){ return new Promise(r=>setTimeout(r,ms)); }

 function find(label){
   label = label.toLowerCase();
   let n = nodes.find(n => (n.label||"").toLowerCase()===label);
   return n ? n.id : null;
 }

 function build(){
   let xs = nodes.map(n=>n.x);
   let ys = nodes.map(n=>n.y);
   let cx = (Math.min(...xs)+Math.max(...xs))/2;
   let cy = (Math.min(...ys)+Math.max(...ys))/2;

   for(let n of nodes){
     let x=n.x-cx, y=-(n.y-cy), zz=z(n.kind);
     nodeMap.set(n.id,{x,y,z:zz,raw:n});
     adj.set(n.id,[]);
   }

   for(let e of edges){
     let cost = e.lengthMeters || 1;
     adj.get(e.from).push({to:e.to,cost});
     if(e.bidirectional) adj.get(e.to).push({to:e.from,cost});
   }
 }

 function draw(open=[], closed=[], current=null, path=[]){
   function pts(ids){
     return {
       x: ids.map(i=>nodeMap.get(i).x),
       y: ids.map(i=>nodeMap.get(i).y),
       z: ids.map(i=>nodeMap.get(i).z)
     };
   }

   let all = {
     type:"scatter3d", mode:"markers",
     x:nodes.map(n=>nodeMap.get(n.id).x),
     y:nodes.map(n=>nodeMap.get(n.id).y),
     z:nodes.map(n=>nodeMap.get(n.id).z),
     marker:{size:4,color:nodes.map(n=>color(n.kind))}
   };

   let openT = pts(open);
   openT.type="scatter3d"; openT.mode="markers";
   openT.marker={size:6,color:"orange"};

   let closedT = pts(closed);
   closedT.type="scatter3d"; closedT.mode="markers";
   closedT.marker={size:5,color:"gray"};

   let curT = pts(current?[current]:[]);
   curT.type="scatter3d"; curT.mode="markers";
   curT.marker={size:8,color:"black"};

   let pathT = {
     type:"scatter3d", mode:"lines+markers",
     x:path.map(i=>nodeMap.get(i).x),
     y:path.map(i=>nodeMap.get(i).y),
     z:path.map(i=>nodeMap.get(i).z),
     line:{width:6,color:"magenta"}
   };

   Plotly.react("plot",[all,openT,closedT,curT,pathT],
     {margin:{l:0,r:0,t:0,b:0},scene:{aspectmode:"data"}});
 }

 function h(a,b){
   let A=nodeMap.get(a).raw;
   let B=nodeMap.get(b).raw;
   return Math.hypot(A.x-B.x,A.y-B.y);
 }

 function path(came,cur){
   let p=[cur];
   while(came.has(cur)){cur=came.get(cur);p.push(cur);}
   return p.reverse();
 }

 async function run(){
   let open=new Set([startId]);
   let closed=new Set();
   let came=new Map();

   let g=new Map(), f=new Map();
   nodes.forEach(n=>{g.set(n.id,Infinity);f.set(n.id,Infinity);});
   g.set(startId,0);
   f.set(startId,h(startId,goalId));

   while(open.size){
     let cur=[...open].reduce((a,b)=>f.get(a)<f.get(b)?a:b);

     draw([...open],[...closed],cur,path(came,cur));
     await sleep(200);

     if(cur===goalId){
       draw([],[],cur,path(came,cur));
       document.getElementById("status").innerText="DONE";
       return;
     }

     open.delete(cur);
     closed.add(cur);

     for(let n of adj.get(cur)){
       if(closed.has(n.to)) continue;
       let t=g.get(cur)+n.cost;
       if(!open.has(n.to)) open.add(n.to);
       else if(t>=g.get(n.to)) continue;

       came.set(n.to,cur);
       g.set(n.to,t);
       f.set(n.to,t+h(n.to,goalId));
     }
   }
 }

 fetch("./holt-floor-1.json")
 .then(r=>r.json())
 .then(d=>{
   nodes=d.nodes||[];
   edges=d.edges||[];
   build();

   startId = find("Entrance 6");
   goalId = find("135");

   document.getElementById("status").innerText =
     "Ready: click Run A*";

   draw();
 })
 .catch(e=>{
   console.error(e);
   document.getElementById("status").innerText="FAILED";
 });
 </script>
 </body>
 </html>
